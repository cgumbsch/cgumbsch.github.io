<section class="hero" id="papers">
{% include head.html %}
<body>
    {% include navbar.html %}
    <section class="hero is-fullheight" id="blog">
        <div class="hero-body">
            <div class="container">
                {% include blogpage-heading.html %}

                <p style="font-size: 0.95rem; color: #888; margin-bottom: 1rem;">
                    Showing <span style="background-color: #faf0e0; padding: 0.1em 0.4em; border-radius: 0.2em;">selected papers</span>. Toggle to view the full list. See <a href="https://scholar.google.de/citations?user=FQOFw5cAAAAJ&hl=de" target="_blank" style="color: #888; text-decoration: underline;">Google Scholar</a> for recent publications.
                </p>

                <!-- Toggle -->
                <div class="has-text-centered mb-4">
                    <label class="toggle-label" style="display: inline-flex; align-items: center; gap: 0.6rem; cursor: pointer; font-size: 0.95rem; color: #888;">
                        <span>Show all papers</span>
                        <div class="toggle-switch">
                            <input type="checkbox" id="show-all-toggle" style="display: none;">
                            <span class="toggle-slider"></span>
                        </div>
                    </label>
                </div>

                <style>
                    .toggle-switch {
                        position: relative;
                        width: 42px;
                        height: 24px;
                    }
                    .toggle-slider {
                        position: absolute;
                        inset: 0;
                        background-color: #ccc;
                        border-radius: 24px;
                        cursor: pointer;
                        transition: background-color 0.25s;
                    }
                    .toggle-slider::before {
                        content: "";
                        position: absolute;
                        width: 18px;
                        height: 18px;
                        left: 3px;
                        top: 3px;
                        background-color: white;
                        border-radius: 50%;
                        transition: transform 0.25s;
                    }
                    #show-all-toggle:checked + .toggle-slider {
                        background-color: #363636;
                    }
                    #show-all-toggle:checked + .toggle-slider::before {
                        transform: translateX(18px);
                    }
                </style>

            </div>
        </div>

        <div id="results-container"></div>

        <!--Blog Cards Section-->
        <div id="papers-container">
            {% for post in site.posts %}
                <div class="paper-entry" data-selected="{% if post.selected %}yes{% endif %}">
                    {% include blog-card.html selected=post.selected %}
                </div>
            {% endfor %}
        </div>

    </section>
    <br>
    <script src="{{site.url}}{{site.baseurl}}/assets/js/simple-jekyll-search.js"></script>
    <script>
        SimpleJekyllSearch({
            searchInput: document.getElementById('search'),
            resultsContainer: document.getElementById('results-container'),
            json: '{{site.url}}{{site.baseurl}}/search.json',
            searchResultTemplate: '<div style="border: 0.15rem dashed black" class="searchResult columns has-text-centered" id="blog-card"><div class="column is-marginless is-paddingless is-one-third-desktop is-one-third-fullhd is-one-third-tablet"><div class="image is-16by9" style="background-image: url({image});"></div></div><a href="{url}"><div class="column has-text-left-desktop has-text-left-tablet"><h1 class="title is-size-4-touch">{title}</h1><div class="content has-text-grey">{content}<hr class="has-background-grey"><span class="has-text-grey">Published on <span class="has-text-weight-semibold">{date}</span></span> | <i class="fas fa-clock"></i> <span class="has-text-weight-semibold">{readtime} min</span> read</div></div></a></div>',
            noResultsText: '<div class="subtitle has-text-centered is-uppercase">No Results Found</div><hr class="has-background-black" style="margin: 0.5rem 5rem 2.5rem 5rem">',
            fuzzy: true,
        });
    </script>
    <script>
        const toggle = document.getElementById('show-all-toggle');
        const entries = document.querySelectorAll('.paper-entry');

        function applyFilter() {
            const showAll = toggle.checked;
            entries.forEach(function(el) {
                if (!showAll && el.dataset.selected !== 'yes') {
                    el.style.display = 'none';
                } else {
                    el.style.display = '';
                }
            });
        }

        toggle.addEventListener('change', applyFilter);
        applyFilter(); // apply on load (default: selected only)
    </script>
</body>
</section>
